<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AgentDoc - Generate Document</title>
    <style>
      body{font-family:Arial,Helvetica,sans-serif;margin:32px}
      textarea{width:100%;height:120px}
      button{padding:8px 14px;margin-top:8px}
      .output{margin-top:16px}
    </style>
  </head>
  <body>
    <h1>AgentDoc - Generate DOCX</h1>
    <p>Enter a request and click <strong>Generate</strong>. When the document is ready you'll get a download link.</p>

    <label for="request">Request</label>
    <textarea id="request" placeholder="Write what you want the agent to do..."></textarea>
    <br />
    <button id="generate">Generate</button>

    <div class="output" id="output"></div>

    <script>
      const btn = document.getElementById('generate')
      const out = document.getElementById('output')
      btn.addEventListener('click', async () => {
        out.innerHTML = 'Submitting...'
        const req = document.getElementById('request').value
        if(!req || req.trim().length===0){ out.innerHTML='Please enter a request.'; return }
        try{
          const res = await fetch('/agent', {
            method:'POST',
            headers:{'Content-Type':'application/json','accept':'application/json'},
            body: JSON.stringify({request: req})
          })
          if(!res.ok){ const text = await res.text(); out.innerText = 'Error: '+res.status+' '+text; return }
          const data = await res.json()
          const docPath = data.docx_file || data.docx || ''
          // Extract filename
          const fileName = docPath.split('/').pop()
          if(fileName){
            const link = document.createElement('a')
            link.href = '/download/' + encodeURIComponent(fileName)
            link.innerText = 'Download generated document'
            link.download = fileName
            out.innerHTML = ''
            out.appendChild(link)
          } else {
            out.innerText = 'No document was produced. Check response in console.'
            console.log(data)
          }
        }catch(e){
          out.innerText = 'Request failed: '+e.message
        }
      })
    </script>
  </body>
</html>
